<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title></title>
    <style>
    
        * {
            padding: 0;
            margin: 0;
        }
        body {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        @keyframes cf4FadeInOut {
          0% {
            opacity:1;
          }
          17% {
            opacity:1;
          }
          25% {
            opacity:0;
          }
          92% {
            opacity:0;
          }
          100% {
            opacity:1;
          }
        }
        #cf4a {
            /*display: block;*/ /* this doesn't seem to matter. */
            position: absolute; /* this is important for the 'image cliping' capability */
            /*height: 281px;*/
            width: 100%;
            height: 100%;
            /*margin: 0 auto;*/
            overflow: hidden; /* this is important for the 'image cliping' capability */
        }
        #cf4a img {
            /*display: inline;*/ /* i really don't know what this is for*/
            /*max-width: 100%;
            max-height: 100%;*/ /* removed in favor of media queries */
            position: absolute;  /*needed for the animation, places images over each other*/
            margin-top: auto; /*supposed to be for the image centering*/
            overflow: hidden; /* to try to hid the images outside the div */
        }
        #cf4a img {
            animation-name: cf4FadeInOut;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            animation-duration: 8s;
        }
        /*div {
            display: block;
        }*/

        #cf4a img:nth-of-type(1) {
          animation-delay: 6s;
        }
        #cf4a img:nth-of-type(2) {
          animation-delay: 4s;
        }
        #cf4a img:nth-of-type(3) {
          animation-delay: 2s;
        }
        #cf4a img:nth-of-type(4) {
          animation-delay: 0;
        }
        @media (orientation: landscape) {
            #cf4a img {
                width: 100%;
            }
        }
        @media (orientation: portrait) {
            #cf4a img {
                height: 100%;
            }
        }

        .main {
            /*display: block;*/
            margin: 3% 3%;
            position: absolute;
        }
        h1 {
            /*position: absolute;*/
            color: white;
            bottom: 0;
            left: 1.5em;
            padding: 10px 20px;
            font-size: 50px;
            font-family: Calibri;
            text-shadow: 2px 2px dimgrey;
        }
        h2 {
            color: white;
            margin: auto 1em 1em;
            font-size: 60px;
            font-family: Calibri;
            text-shadow: 2px 2px dimgrey;
        }
        ol,ul {
            list-style: none;
        }
        li {
            margin: 20px;
            font: normal 35px calibri, serif;
        }
        a {
            color: white;
            text-decoration: none;
            -moz-transition: 0.2s color linear;
            -webkit-transition: 0.2s color linear;
            transition: 0.2s color linear;
        }
        #contact {
            border-style: solid;
            border-color: white;
            border-radius: 10px;
            padding: 5px 15px;
        }
        a:hover {
            color: lightgray;
        }

    </style>
</head>
